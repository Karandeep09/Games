<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Game Arcade</title>
    <link rel="stylesheet" href="menu.css" />
  </head>
  <body>
    <main class="arcade-shell">
      <header class="arcade-header">
        <p class="eyebrow">AI Game Arcade</p>
        <h1>Pick a game</h1>
      </header>

      <section class="game-grid" aria-label="Games">
        <a class="game-tile space-tile" href="space.html">
          <span class="game-art" aria-hidden="true"></span>
          <span class="game-name">Starbreaker Run</span>
          <span class="game-desc">3D space shooter with aliens, asteroids, lasers, and waves.</span>
          <span class="play-label">Play</span>
        </a>

        <a class="game-tile sandbox-tile" href="sandbox.html">
          <span class="game-art" aria-hidden="true"></span>
          <span class="game-name">Sandbox</span>
          <span class="game-desc">Drop sand, water, gunpowder, fire, and stone into a falling-powder world.</span>
          <span class="play-label">Play</span>
        </a>
      </section>
    </main>
  </body>
</html>
